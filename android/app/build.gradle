plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

// Release signing: use android/key.properties + android/upload-keystore.jks (see RELEASE_SIGNING_README.md)
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def keystoreFile = (keystorePropertiesFile.exists() && keystoreProperties['storeFile']) \
    ? rootProject.file(keystoreProperties['storeFile']) : null
def useReleaseKeystore = (keystoreFile != null && keystoreFile.exists())

// Extract version from pubspec.yaml (single source of truth)
def getPubspecVersion() {
    def pubspecFile = file("../../pubspec.yaml")
    if (!pubspecFile.exists()) {
        throw new GradleException("pubspec.yaml not found at: ${pubspecFile.absolutePath}")
    }
    
    def pubspecContent = pubspecFile.text
    def versionMatch = (pubspecContent =~ /version:\s*(\d+\.\d+\.\d+)\+(\d+)/)
    
    if (!versionMatch) {
        throw new GradleException(
            "Invalid version format in pubspec.yaml. " +
            "Expected format: version: major.minor.patch+build (e.g., version: 2.0.2+4)"
        )
    }
    
    def versionName = versionMatch[0][1]  // e.g., "2.0.2"
    def versionCode = versionMatch[0][2].toInteger()  // e.g., 4
    
    println "📦 Version extracted from pubspec.yaml: versionName=${versionName}, versionCode=${versionCode}"
    
    return [
        name: versionName,
        code: versionCode
    ]
}

def appVersion = getPubspecVersion()

android {
    namespace "com.business360.ecashbook_app"
    compileSdk = 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.business360.ecashbook_app"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode appVersion.code
        versionName appVersion.name
        
        // Enable multidex support
        multiDexEnabled true
        
        // Enable vector drawable support
        vectorDrawables.useSupportLibrary = true
    }

    signingConfigs {
        release {
            if (useReleaseKeystore) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreFile
                storePassword keystoreProperties['storePassword']
            } else {
                initWith signingConfigs.debug
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
